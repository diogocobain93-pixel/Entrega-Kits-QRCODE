<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Entrega de Kits</title>
    <link rel="manifest" href="/manifest.json" />
    <script>
      // Clear service workers and caches on load to fix blank white screen issues from old builds
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          for (const registration of registrations) {
            registration.unregister().then((success) => {
              if (success) {
                console.log('Service Worker unregistered successfully.');
                // Clear cache and hard reload once if we unregistered a service worker to force fresh assets
                if (window.caches) {
                  caches.keys().then((names) => {
                    Promise.all(names.map(name => caches.delete(name))).then(() => {
                      window.location.reload();
                    });
                  });
                }
              }
            });
          }
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
